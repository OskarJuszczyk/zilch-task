name: Lint and Typecheck

on:
    push:
        branches: [main]
    pull_request:
        branches: ['*']

jobs:
    lint-and-typecheck:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install

            - name: Run Lint
              run: bun run lint

            - name: Run TypeScript check
              run: bun run type:check
