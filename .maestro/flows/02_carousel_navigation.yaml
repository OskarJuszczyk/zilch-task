appId: com.ZilchTask
---
- launchApp
- assertVisible: "Mortgage Payments"
# Swipe to card 1 (Shopping Card - ACTIVE)
- swipe:
    start: "85%, 40%"
    end: "15%, 40%"
    duration: 300
- assertVisible: "Shopping Card"
# Swipe to card 2 (Travel & Entertainment - BLOCKED)
- swipe:
    start: "85%, 40%"
    end: "15%, 40%"
    duration: 300
- assertVisible: "Travel & Entertainment"
- assertVisible:
    id: "card-info-banner"
- assertNotVisible:
    id: "unlock-details"
# Swipe to card 3 (Emerald Payments - PENDING)
- swipe:
    start: "85%, 40%"
    end: "15%, 40%"
    duration: 300
- assertVisible: "Emerald Payments"
- assertVisible:
    text: ".*generating your card details.*"
# Swipe back to first card
- swipe:
    start: "15%, 40%"
    end: "85%, 40%"
    duration: 300
- swipe:
    start: "15%, 40%"
    end: "85%, 40%"
    duration: 300
- swipe:
    start: "15%, 40%"
    end: "85%, 40%"
    duration: 300
- assertVisible: "Mortgage Payments"
